    - name: "Zaye Buanno"
      role: "PhD Student, Biology"
      bio: "Zaye received her BA in biology from Skidmore College, where she conducted research investigating how bacteria adapt biochemically to different environmental niches and explored their various mechanisms of protein synthesis. Upon joining the Lucas lab, Zaye began her project studying the mechanisms behind adaptation of the human gut microbiome in response to pharmacological perturbation in a chemostat bioreactor system. Outside of the lab, Zaye enjoys spending time with her cat, Paisley."
      avatar: "images/ZayeBuanno.jpg"
