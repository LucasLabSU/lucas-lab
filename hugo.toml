baseURL = 'https://www.lucaslab.org/'
languageCode = 'en-us'
title = 'Lucas Lab'

# ---------------------------------------------------------------------------
# Tailwind CSS v4 integration
# Hugo writes the list of classes it actually uses to hugo_stats.json, then
# mounts it into the assets dir so Tailwind can scan it. The cachebusters make
# the CSS rebuild whenever that file (or a tailwind/postcss config) changes.
# ---------------------------------------------------------------------------
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'

[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

