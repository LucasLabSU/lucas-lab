<script>
  (function () {
    var toggle = document.getElementById('nav-toggle');
    var panel = document.getElementById('nav-panel');
    if (!toggle || !panel) return;
    toggle.addEventListener('click', function () {
      var open = panel.classList.toggle('hidden') === false;
      toggle.setAttribute('aria-expanded', String(open));
    });
    // Close the panel after tapping a link.
    panel.querySelectorAll('a').forEach(function (a) {
      a.addEventListener('click', function () {
        panel.classList.add('hidden');
        toggle.setAttribute('aria-expanded', 'false');
      });
    });
  })();

  // Research theme expand/collapse
  (function () {
    var themeToggles = document.querySelectorAll('.theme-toggle');
    themeToggles.forEach(function (btn) {
      btn.addEventListener('click', function () {
        var details = btn.parentElement.querySelector('.theme-details');
        var icon = btn.querySelector('.toggle-icon');
        var text = btn.querySelector('.toggle-text');
        var isHidden = details.classList.toggle('hidden');
        btn.setAttribute('aria-expanded', String(!isHidden));
        text.textContent = isHidden ? 'Learn more' : 'Show less';
        icon.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(180deg)';
      });
    });
  })();
</script>
